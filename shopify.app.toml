client_id = "56a097e4a28b85735636be6545ee8784"
name = "ai-shopping-agent"
application_url = "https://ai-shopping-agent-0hpw.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = [ "app/scopes_update" ]
uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_products,write_products,read_customers,write_customers,read_orders,write_orders,read_discounts,write_discounts,read_files,write_files,read_metaobjects,write_metaobjects,read_content,write_content,read_companies,write_companies,read_shopify_payments_accounts,read_online_store_navigation,read_inventory,write_inventory,read_locations,read_markets_home"

[auth]
redirect_urls = [ "https://ai-shopping-agent-0hpw.onrender.com/api/auth" ]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

[product.metafields.app.demo_info.access]
admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

[metaobjects.app.example.access]
admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[app_proxy]
url = "https://ai-shopping-agent-0hpw.onrender.com/proxy/recommend"
subpath = "assistant"
prefix = "apps"